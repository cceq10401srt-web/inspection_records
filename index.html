<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排放管道檢測作業紀錄表</title>
<style>
  :root {
    --green-dark:  #1a3d2b;
    --green-mid:   #2e6b47;
    --green-light: #e8f3ec;
    --green-pale:  #f4faf6;
    --accent:      #3a8f5e;
    --amber:       #c97c1a;
    --amber-light: #fff7e6;
    --text:        #1a1f1c;
    --text-muted:  #5a6b61;
    --border:      #c5d8cc;
    --white:       #ffffff;
    --shadow:      0 2px 12px rgba(30,80,50,.10);
    --radius:      10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--green-pale);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--green-dark);
    color: var(--white);
    padding: 20px 24px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  header .logo {
    width: 42px; height: 42px; flex-shrink: 0;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: .04em; }
  header p  { font-size: 12px; opacity: .72; margin-top: 1px; }
  header .spacer { flex: 1; }
  .btn-records {
    background: rgba(255,255,255,.13);
    color: var(--white);
    border: 1px solid rgba(255,255,255,.28);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
  }
  .btn-records:hover { background: rgba(255,255,255,.22); }

  /* ── TABS ── */
  .tab-bar {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    display: flex;
    padding: 0 16px;
    overflow-x: auto;
    position: sticky; top: 80px; z-index: 90;
  }
  .tab-bar button {
    background: none; border: none;
    padding: 14px 18px 12px;
    font-size: 14px; font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    transition: color .2s, border-color .2s;
  }
  .tab-bar button.active {
    color: var(--green-mid);
    border-bottom-color: var(--green-mid);
  }
  .tab-bar button:hover:not(.active) { color: var(--text); }

  /* ── MAIN LAYOUT ── */
  .container { max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── SECTION CARD ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .card-head {
    background: var(--green-light);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .card-head .num {
    background: var(--green-mid);
    color: var(--white);
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .card-head h2 { font-size: 15px; font-weight: 700; color: var(--green-dark); }
  .card-body { padding: 20px; }

  /* ── FIELD GROUPS ── */
  .field-group { margin-bottom: 18px; }
  .field-group:last-child { margin-bottom: 0; }
  label.field-label {
    display: block;
    font-size: 13px; font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  label.field-label .req { color: #d0310e; margin-left: 2px; }
  input[type=text], input[type=tel], input[type=date], input[type=time],
  textarea, select {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--white);
    transition: border-color .18s, box-shadow .18s;
    -webkit-appearance: none;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(58,143,94,.15);
  }
  textarea { resize: vertical; min-height: 80px; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media(max-width:560px) { .row2, .row3 { grid-template-columns: 1fr; } }

  /* ── CHECKBOX / RADIO GROUPS ── */
  .check-group {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px;
  }
  .check-group label {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; cursor: pointer;
    padding: 6px 12px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    user-select: none;
    transition: background .15s, border-color .15s;
  }
  .check-group input { accent-color: var(--green-mid); }
  .check-group label:has(input:checked) {
    background: var(--green-light);
    border-color: var(--accent);
    color: var(--green-dark);
    font-weight: 600;
  }

  .yn-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .yn-row .label-text { font-size: 14px; min-width: 200px; flex: 1; }
  .yn-group { display: flex; gap: 8px; }
  .yn-group label {
    display: flex; align-items: center; gap: 5px;
    font-size: 14px; cursor: pointer;
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
  }
  .yn-group label:has(input:checked) {
    background: var(--green-light);
    border-color: var(--accent);
    font-weight: 600;
  }
  .yn-row .detail-input {
    flex: 2; min-width: 160px;
  }
  .yn-row .detail-input input {
    padding: 6px 10px; font-size: 13px;
  }

  /* ── SAMPLING TABLE ── */
  .table-wrap { overflow-x: auto; margin-top: 10px; }
  table.sampling {
    width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px;
  }
  table.sampling th {
    background: var(--green-light);
    color: var(--green-dark);
    font-weight: 700;
    padding: 8px 10px;
    text-align: center;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  table.sampling td {
    padding: 5px 6px;
    border: 1px solid var(--border);
    vertical-align: middle;
  }
  table.sampling td input, table.sampling td select {
    padding: 5px 7px; font-size: 13px;
    border-radius: 5px; border: 1px solid #d8e8de;
  }
  .btn-add-row {
    margin-top: 10px;
    background: none;
    border: 1.5px dashed var(--accent);
    color: var(--accent);
    border-radius: 7px;
    padding: 7px 16px;
    font-size: 13px; cursor: pointer;
    transition: background .15s;
    width: 100%;
  }
  .btn-add-row:hover { background: var(--green-light); }
  .btn-del-row {
    background: #fde8e4; border: none;
    color: #b43a2e; border-radius: 5px;
    width: 28px; height: 28px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .btn-del-row:hover { background: #f9c9c3; }

  /* ── INSPECTION ITEMS ── */
  .insp-item {
    background: var(--green-pale);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .insp-item .title { font-weight: 700; margin-bottom: 8px; font-size: 14px; }
  .insp-item-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
  .insp-item-row .yn-group { flex-shrink: 0; margin-top: 2px; }
  .insp-item-row .detail-input { flex: 1; min-width: 140px; }
  .insp-item-row .time-input { width: 120px; }
  .insp-item-row .extra-input { flex: 1; min-width: 140px; }
  .insp-item-row label { font-size: 13px; color: var(--text-muted); }

  /* ── DIVIDER LABEL ── */
  .section-label {
    font-size: 12px; font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 0 0 6px;
    border-bottom: 1px solid var(--border);
    margin: 16px 0 12px;
  }

  /* ── ITRI SIGNATURE ── */
  .itri-sign {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .itri-sign label { font-size: 13px; font-weight: 600; white-space: nowrap; }
  .itri-sign input { flex: 1; max-width: 240px; }

  /* ── SUBMIT BAR ── */
  .submit-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; gap: 10px; justify-content: flex-end;
    box-shadow: 0 -2px 12px rgba(0,0,0,.08);
    z-index: 95;
  }
  .btn-save {
    background: var(--green-mid);
    color: var(--white); border: none;
    border-radius: 8px; padding: 11px 28px;
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background .18s;
    font-family: inherit;
  }
  .btn-save:hover { background: var(--green-dark); }
  .btn-save:disabled { background: #a0b8a8; cursor: not-allowed; }
  .btn-draft {
    background: var(--white); color: var(--green-mid);
    border: 1.5px solid var(--green-mid);
    border-radius: 8px; padding: 11px 22px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .18s;
    font-family: inherit;
  }
  .btn-draft:hover { background: var(--green-light); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--green-dark); color: var(--white);
    padding: 11px 22px; border-radius: 8px;
    font-size: 14px; font-weight: 600;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
    z-index: 200;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }
  #toast.error { background: #b43a2e; }

  /* ── RECORDS VIEW ── */
  #records-panel { display: none; }
  #records-panel.active { display: block; }
  .record-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: box-shadow .18s, border-color .18s;
    position: relative;
  }
  .record-card:hover { box-shadow: 0 4px 16px rgba(30,80,50,.12); border-color: var(--accent); }
  .record-card h3 { font-size: 15px; font-weight: 700; color: var(--green-dark); }
  .record-card .meta { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .record-card .badge {
    position: absolute; top: 14px; right: 14px;
    font-size: 11px; font-weight: 700; padding: 3px 9px;
    border-radius: 20px;
  }
  .badge-done { background: var(--green-light); color: var(--green-mid); }
  .badge-draft { background: var(--amber-light); color: var(--amber); }

  .record-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-sm {
    padding: 5px 14px; border-radius: 6px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: 1.5px solid;
    transition: background .15s; font-family: inherit;
  }
  .btn-sm-green { color: var(--green-mid); border-color: var(--green-mid); background: var(--white); }
  .btn-sm-green:hover { background: var(--green-light); }
  .btn-sm-red   { color: #b43a2e; border-color: #d9a09a; background: var(--white); }
  .btn-sm-red:hover { background: #fde8e4; }
  .btn-sm-amber { color: var(--amber); border-color: #e8c07a; background: var(--white); }
  .btn-sm-amber:hover { background: var(--amber-light); }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  /* ── CONFIG PANEL ── */
  #config-panel {
    background: var(--amber-light);
    border: 1.5px solid #e8c07a;
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 20px;
  }
  #config-panel h3 { font-size: 15px; color: var(--amber); font-weight: 700; margin-bottom: 12px; }
  #config-panel p { font-size: 13px; color: #7a5a1a; margin-bottom: 10px; }
  #config-panel label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  #config-panel input { margin-bottom: 10px; font-size: 13px; }
  .btn-config-save {
    background: var(--amber); color: var(--white); border: none;
    border-radius: 7px; padding: 8px 20px; font-size: 13px;
    font-weight: 700; cursor: pointer; font-family: inherit;
  }

  /* Mobile optimizations */
  @media(max-width:480px) {
    header h1 { font-size: 15px; }
    header p { display: none; }
    .card-body { padding: 14px; }
    .yn-row { flex-direction: column; align-items: flex-start; }
    .insp-item-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🏭</div>
  <div>
    <h1>排放管道檢測作業紀錄表</h1>
    <p>公私場所固定污染源檢測作業</p>
  </div>
  <div class="spacer"></div>
  <button class="btn-records" onclick="showView('records')">📋 查看紀錄</button>
</header>

<!-- ── FORM VIEW ── -->
<div id="form-view">
  <div class="tab-bar">
    <button class="active" onclick="switchTab(0)">一、檢測排程</button>
    <button onclick="switchTab(1)">二、執行檢測</button>
    <button onclick="switchTab(2)">三、後續追蹤</button>
  </div>

  <div class="container">

    <!-- ══ 設定面板 ══ -->
    <div id="config-panel">
      <h3>⚙️ Supabase 連線設定</h3>
      <p>請輸入您的 Supabase 專案資訊，設定後會儲存在此裝置。</p>
      <label>Supabase Project URL</label>
      <input type="text" id="cfg-url" placeholder="https://xxxx.supabase.co">
      <label>Supabase Anon Key</label>
      <input type="text" id="cfg-key" placeholder="eyJhbGci...">
      <button class="btn-config-save" onclick="saveConfig()">儲存設定</button>
    </div>

    <!-- ══ TAB 1：檢測排程 ══ -->
    <div class="tab-panel active" id="tab-0">

      <div class="card">
        <div class="card-head"><div class="num">1</div><h2>基本資料</h2></div>
        <div class="card-body">
          <div class="field-group">
            <label class="field-label">公私場所名稱 <span class="req">*</span></label>
            <input type="text" id="site-name" placeholder="請輸入公司 / 工廠名稱">
          </div>
          <div class="row2">
            <div class="field-group">
              <label class="field-label">檢測日期 <span class="req">*</span></label>
              <input type="date" id="inspect-date">
            </div>
            <div class="field-group">
              <label class="field-label">入廠時間</label>
              <input type="time" id="entry-time">
            </div>
          </div>
          <div class="row2">
            <div class="field-group">
              <label class="field-label">受檢廠家聯絡窗口</label>
              <input type="text" id="contact-name" placeholder="姓名">
            </div>
            <div class="field-group">
              <label class="field-label">聯絡電話</label>
              <input type="tel" id="contact-tel" placeholder="02-xxxx-xxxx">
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">檢測公司名稱</label>
            <input type="text" id="company-name">
          </div>
          <div class="row2">
            <div class="field-group">
              <label class="field-label">檢測人員名單</label>
              <input type="text" id="staff-list" placeholder="多人以逗號分隔">
            </div>
            <div class="field-group">
              <label class="field-label">檢測人員電話</label>
              <input type="tel" id="staff-tel">
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">車牌號碼</label>
            <input type="text" id="plate-no" placeholder="ABC-1234">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><div class="num">2</div><h2>現場情形</h2></div>
        <div class="card-body">
          <div class="row2">
            <div class="field-group">
              <label class="field-label">防制設備名稱/編號</label>
              <input type="text" id="equip-name">
            </div>
            <div class="field-group">
              <label class="field-label">效率（設計/實測）</label>
              <input type="text" id="equip-eff" placeholder="例：90%/88%">
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">採樣口照片</label>
            <div class="check-group" id="photo-opts">
              <label><input type="radio" name="photo" value="有"> 有</label>
              <label><input type="radio" name="photo" value="無"> 無</label>
              <label><input type="radio" name="photo" value="其他"> 其他</label>
            </div>
            <input type="text" id="photo-other" placeholder="其他說明" style="margin-top:8px;display:none;">
          </div>

          <div class="section-label">採樣口資料</div>
          <div class="table-wrap">
            <table class="sampling" id="sampling-table">
              <thead>
                <tr>
                  <th>採樣口名稱</th>
                  <th>位置</th>
                  <th>孔徑(尺寸)</th>
                  <th>凸緣(尺寸)</th>
                  <th>形狀</th>
                  <th>採樣平台</th>
                  <th>高度(m)</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="sampling-rows"></tbody>
            </table>
          </div>
          <button class="btn-add-row" onclick="addSamplingRow()">＋ 新增採樣口</button>

          <div class="field-group" style="margin-top:16px;">
            <label class="field-label">複數採樣口同步</label>
            <div class="check-group">
              <label><input type="radio" name="sync" value="是"> 是</label>
              <label><input type="radio" name="sync" value="否"> 否</label>
            </div>
            <input type="text" id="sync-dist" placeholder="採樣口間距（需同步時填寫）" style="margin-top:8px;">
          </div>

          <div class="field-group">
            <label class="field-label">檢測項目</label>
            <div class="check-group" id="test-items">
              <label><input type="checkbox" name="test" value="NMHC"> NMHC</label>
              <label><input type="checkbox" name="test" value="VOCs"> VOCs 個別物種</label>
              <label><input type="checkbox" name="test" value="重金屬"> 重金屬</label>
              <label><input type="checkbox" name="test" value="其他"> 其他</label>
            </div>
            <input type="text" id="test-other" placeholder="其他項目說明" style="margin-top:8px;display:none;">
          </div>

          <div class="section-label">作業條件</div>
          <div class="field-group">
            <label class="field-label">入廠申請文件</label>
            <div class="check-group">
              <label><input type="radio" name="doc" value="無"> 無</label>
              <label><input type="radio" name="doc" value="有"> 有</label>
            </div>
            <input type="text" id="doc-detail" placeholder="文件名稱或說明" style="margin-top:8px;">
          </div>
          <div class="row3">
            <div class="field-group">
              <label class="field-label">放置空間</label>
              <div class="check-group">
                <label><input type="radio" name="space" value="室內"> 室內</label>
                <label><input type="radio" name="space" value="室外"> 室外</label>
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">電力供應</label>
              <div class="check-group" id="power-opts">
                <label><input type="radio" name="power" value="110V"> 110V</label>
                <label><input type="radio" name="power" value="220V"> 220V</label>
                <label><input type="radio" name="power" value="其他"> 其他</label>
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">水源供應</label>
              <div class="check-group" id="water-opts">
                <label><input type="radio" name="water" value="自來水"> 自來水</label>
                <label><input type="radio" name="water" value="地下水"> 地下水</label>
                <label><input type="radio" name="water" value="其他"> 其他</label>
              </div>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">檢測所使用鋼瓶是否有管制</label>
            <div class="check-group">
              <label><input type="radio" name="cylinder" value="是"> 是</label>
              <label><input type="radio" name="cylinder" value="否"> 否</label>

async function sbFetch(path, opts = {}) {
  if (!SUPABASE_URL || !SUPABASE_KEY) throw new Error('請先設定 Supabase 連線');
  const { headers: extraHeaders, ...restOpts } = opts;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(extraHeaders || {})
    },
    ...restOpts
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.status === 204 ? null : res.json();
}

        <input type="date" id="${it.key}_date" title="${dateLabel}">
      </div>
    `;

  });
}

//  CONDITIONAL SHOW/HIDE
// ══════════════════════════════════════
function setupConditionals() {
  // photo 其他
  document.querySelectorAll('input[name="photo"]').forEach(r => {
    r.addEventListener('change', () => {
      document.getElementById('photo-other').style.display = r.value === '其他' ? 'block' : 'none';
    });
  });
  // test item 其他
  document.querySelector('input[name="test"][value="其他"]').addEventListener('change', e => {
    document.getElementById('test-other').style.display = e.target.checked ? 'block' : 'none';
  });
  // 各個 radio 的其他
  ['line', 'source', 'activity', 'capacity', 'cylinder'].forEach(n => {
    document.querySelectorAll(`input[name="${n}"]`).forEach(r => {
      r.addEventListener('change', () => {
        const el = document.getElementById(`${n}-other`);
        if (el) el.style.display = r.value === '其他' ? 'block' : 'none';
      });
    });
  });
}

// ══════════════════════════════════════
//  COLLECT FORM DATA
// ══════════════════════════════════════
function val(id) { return (document.getElementById(id)||{}).value || ''; }
function dateVal(id) { const v = (document.getElementById(id)||{}).value; return v || null; }
function radio(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : '';
}
function checks(name) {
  return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(e => e.value);
}

function collectForm() {
  const d = {
    // 基本資料
    site_name: val('site-name'),
    inspect_date: dateVal('inspect-date'),
    entry_time: val('entry-time'),
    contact_name: val('contact-name'),
    contact_tel: val('contact-tel'),
    company_name: val('company-name'),
    staff_list: val('staff-list'),
    staff_tel: val('staff-tel'),
    plate_no: val('plate-no'),
    // 現場
    equip_name: val('equip-name'),
    equip_eff: val('equip-eff'),
    photo: radio('photo'),
    photo_other: val('photo-other'),
    sampling_ports: getSamplingData(),
    sync: radio('sync'),
    sync_dist: val('sync-dist'),
    test_items: checks('test'),
    test_other: val('test-other'),
    doc: radio('doc'),
    doc_detail: val('doc-detail'),
    space: radio('space'),
    power: radio('power'),
    water: radio('water'),
    cylinder: radio('cylinder'),
    cylinder_other: val('cylinder-other'),
    // 操作
    line: radio('line'),
    line_other: val('line-other'),
    line_remark: val('line-remark'),
    source: radio('source'),
    source_other: val('source-other'),
    source_remark: val('source-remark'),
    activity: radio('activity'),
    activity_other: val('activity-other'),
    capacity: radio('capacity'),
    capacity_other: val('capacity-other'),
    itri1: val('itri1'),
    // 執行
    license_given: radio('lic'),
    report_given: radio('rep'),
    itri2: val('itri2'),
    // 後續
    anomaly: val('anomaly'),
    itri3: val('itri3'),
    submitted_at: new Date().toISOString(),
  };

  changeItems.forEach(it => {
    d[it.key] = radio(it.key);
    d[`${it.key}_detail`] = val(`${it.key}_detail`);
  });
  inspItems.forEach(it => {
    d[`${it.key}_ok`] = radio(`${it.key}_ok`);
    d[`${it.key}_detail`] = val(`${it.key}_detail`);
    d[`${it.key}_time`] = val(`${it.key}_time`);
    d[`${it.key}_extra`] = val(`${it.key}_extra`);
    if (it.hasName) d[`${it.key}_name`] = val(`${it.key}_name`);
  });
  followupItems.forEach(it => {
    d[it.key] = radio(it.key);
    d[`${it.key}_date`] = dateVal(`${it.key}_date`);
    if (it.hasName) d[`${it.key}_name`] = val(`${it.key}_name`);
  });
  return d;
}

// ══════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════
let editingId = null; // 記錄目前編輯中的紀錄 id

async function submitForm() {
  const data = collectForm();
  if (!data.site_name) { toast('請填寫公私場所名稱', true); return; }
  if (!data.inspect_date) { toast('請選擇檢測日期', true); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '儲存中...';
  try {
    data.status = 'done';
    if (editingId) {
      // 覆蓋更新舊紀錄
      await sbFetch(`${TABLE}?id=eq.${editingId}`, {
        method: 'PATCH',
        headers: { 'Prefer': 'return=representation' },
        body: JSON.stringify(data)
      });
      toast('✅ 紀錄已更新');
      sendLineNotify(data);
      sendEmailNotify(data);
      editingId = null;
    } else {
      // 新增紀錄
      await sbFetch(`${TABLE}`, { method: 'POST', body: JSON.stringify(data) });
      toast('✅ 紀錄已成功儲存至 Supabase');
      sendLineNotify(data);
      sendEmailNotify(data);
    }
    setTimeout(() => showView('records'), 1200);
  } catch(e) {
    toast('儲存失敗：' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '送出並儲存';
    document.getElementById('submit-btn').textContent = editingId ? '更新紀錄' : '送出並儲存';
  }
}

async function saveDraft() {
  const data = collectForm();
  data.status = 'draft';
  try {
    await sbFetch(`${TABLE}`, { method: 'POST', body: JSON.stringify(data) });
    toast('📝 草稿已儲存');
  } catch(e) {
    // fallback: local storage
    const drafts = JSON.parse(localStorage.getItem('drafts')||'[]');
    data.id = 'local_' + Date.now();
    drafts.push(data);
    localStorage.setItem('drafts', JSON.stringify(drafts));
    toast('📝 草稿已儲存（本機）');
  }
}

// ══════════════════════════════════════
//  RECORDS
// ══════════════════════════════════════
async function showView(v) {
  document.getElementById('form-view').style.display = v === 'form' ? 'block' : 'none';
  if (v === 'form' && !editingId) {
    document.getElementById('submit-btn').textContent = '送出並儲存';
  }
  document.getElementById('records-view').style.display = v === 'records' ? 'block' : 'none';
  document.getElementById('submit-bar').style.display = v === 'form' ? 'flex' : 'none';
  if (v === 'records') await loadRecords();
}

async function loadRecords() {
  const list = document.getElementById('records-list');
  list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);">載入中...</div>';
  try {
    const records = await sbFetch(`${TABLE}?select=*&order=submitted_at.desc&limit=50`);
    if (!records || records.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="icon">📋</div>
          <div>尚無檢測紀錄</div>
          <div style="font-size:13px;margin-top:8px;">送出表單後，紀錄將顯示在此</div>
        </div>`;
      return;
    }
    list.innerHTML = '';
    records.forEach(rec => {
      const card = document.createElement('div');
      card.className = 'record-card';
      card.dataset.rec = JSON.stringify(rec);
      const d = rec.inspect_date || '—';
      const site = rec.site_name || '（未命名）';
      card.innerHTML = `
        <div class="badge ${rec.status==='done'?'badge-done':'badge-draft'}">${rec.status==='done'?'已完成':'草稿'}</div>
        <h3>${site}</h3>
        <div class="meta">📅 ${d}　🏢 ${rec.company_name||'—'}　👤 ${rec.itri1||rec.itri2||'—'}</div>
        <div class="record-actions">
          <button class="btn-sm btn-sm-green" onclick="downloadRecord('${rec.id}')">⬇ 下載表單</button>
          <button class="btn-sm btn-sm-amber" onclick="editRecord(this)">✏ 重新編輯</button>
          <button class="btn-sm btn-sm-red" onclick="deleteRecord('${rec.id}', this)">🗑 刪除</button>
        </div>
      `;
      list.appendChild(card);
    });
  } catch(e) {
    list.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>載入失敗：${e.message}</div></div>`;
  }
}


function editRecord(btn) {
  const rec = JSON.parse(btn.closest('.record-card').dataset.rec);
  editingId = rec.id;
  showView('form');

  // 等 DOM 切換完成後填入資料
  setTimeout(() => {
    const set = (id, v) => { const el = document.getElementById(id); if(el && v) el.value = v; };
    const setRadio = (name, v) => {
      const el = document.querySelector(`input[name="${name}"][value="${v}"]`);
      if (el) el.checked = true;
    };
    const setCheck = (name, arr) => {
      if (!Array.isArray(arr)) return;
      document.querySelectorAll(`input[name="${name}"]`).forEach(el => {
        el.checked = arr.includes(el.value);
      });
    };

    // 基本資料
    set('site-name', rec.site_name);
    set('inspect-date', rec.inspect_date);
    set('entry-time', rec.entry_time);
    set('contact-name', rec.contact_name);
    set('contact-tel', rec.contact_tel);
    set('company-name', rec.company_name);
    set('staff-list', rec.staff_list);
    set('staff-tel', rec.staff_tel);
    set('plate-no', rec.plate_no);
    // 現場
    set('equip-name', rec.equip_name);
    set('equip-eff', rec.equip_eff);
    setRadio('photo', rec.photo);
    set('photo-other', rec.photo_other);
    set('sync-dist', rec.sync_dist);
    setCheck('test', rec.test_items);
    set('test-other', rec.test_other);
    setRadio('doc', rec.doc);
    set('doc-detail', rec.doc_detail);
    setRadio('space', rec.space);
    setRadio('power', rec.power);
    setRadio('water', rec.water);
    setRadio('cylinder', rec.cylinder);
    set('cylinder-other', rec.cylinder_other);
    setRadio('sync', rec.sync);
    // 操作
    setRadio('line', rec.line);
    set('line-other', rec.line_other);
    set('line-remark', rec.line_remark);
    setRadio('source', rec.source);
    set('source-other', rec.source_other);
    set('source-remark', rec.source_remark);
    setRadio('activity', rec.activity);
    set('activity-other', rec.activity_other);
    setRadio('capacity', rec.capacity);
    set('capacity-other', rec.capacity_other);
    set('itri1', rec.itri1);
    // 執行
    setRadio('lic', rec.license_given);
    setRadio('rep', rec.report_given);
    set('itri2', rec.itri2);
    // 後續
    set('anomaly', rec.anomaly);
    set('itri3', rec.itri3);

    // 異動項目
    ['date_change','port_pos_change','port_qty_change','test_change','cap_change','process_ok'].forEach(k => {
      setRadio(k, rec[k]);
      set(`${k}_detail`, rec[`${k}_detail`]);
    });
    // 檢測項目
    ['i1','i2','i3','i4','i5'].forEach(k => {
      setRadio(`${k}_ok`, rec[`${k}_ok`]);
      set(`${k}_detail`, rec[`${k}_detail`]);
      set(`${k}_time`, rec[`${k}_time`]);
      set(`${k}_extra`, rec[`${k}_extra`]);
      if (k==='i5') set('i5_name', rec.i5_name);
    });
    // 後續追蹤
    ['f1','f2','f3','f4','f5','f6','f7'].forEach(k => {
      setRadio(k, rec[k]);
      set(`${k}_date`, rec[`${k}_date`]);
      if (k==='f7') set('f7_name', rec.f7_name);
    });

    // 採樣口
    document.getElementById('sampling-rows').innerHTML = '';
    samplingRows = [];
    const ports = Array.isArray(rec.sampling_ports) ? rec.sampling_ports : [];
    if (ports.length > 0) {
      ports.forEach(p => addSamplingRow(p));
    } else {
      addSamplingRow();
    }

    switchTab(0);
    document.getElementById('submit-btn').textContent = '更新紀錄';
    toast('📝 已載入紀錄，修改後點「更新紀錄」儲存');
  }, 100);
}

async function deleteRecord(id, btn) {
  if (!confirm('確定要刪除此筆紀錄？')) return;
  try {
    await sbFetch(`${TABLE}?id=eq.${id}`, { method: 'DELETE' });
    btn.closest('.record-card').remove();
    toast('🗑 已刪除');
  } catch(e) { toast('刪除失敗：' + e.message, true); }
}

async function downloadRecord(id) {
  try {
    const recs = await sbFetch(`${TABLE}?id=eq.${id}`);
    const r = recs[0];
    const html = generateReportHTML(r);
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `排放管道檢測紀錄_${r.site_name||'未命名'}_${r.inspect_date||''}.html`;
    a.click();
    URL.revokeObjectURL(url);
    toast('⬇ 表單已下載');
  } catch(e) { toast('下載失敗：' + e.message, true); }
}

let toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isErr ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}
